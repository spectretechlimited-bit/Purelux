<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Opening Admin | PureLux</title>
    <meta http-equiv="refresh" content="2; url=../src/admin/index.html"/>
    <style>
        :root {
            --bg: #f5f1f8;
            --surface: #ffffff;
            --ink: #1f1631;
            --muted: #6b6480;
            --accent: #d790ee;
            --accent-soft: rgba(215, 144, 238, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Manrope, Segoe UI, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 20% 15%, var(--accent-soft), transparent 32%),
                radial-gradient(circle at 80% 85%, rgba(124, 131, 255, 0.18), transparent 35%),
                var(--bg);
            overflow: hidden;
        }

        .loader-shell {
            width: min(92vw, 430px);
            background: color-mix(in srgb, var(--surface) 86%, white 14%);
            border: 1px solid rgba(215, 144, 238, 0.28);
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 28px 70px rgba(31, 22, 49, 0.12);
            backdrop-filter: blur(8px);
            text-align: center;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 0.01em;
            margin-bottom: 18px;
        }

        .brand-dot {
            width: 14px;
            height: 14px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 0 0 rgba(215, 144, 238, 0.7);
            animation: pulse 1.8s ease-out infinite;
        }

        .headline {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 800;
        }

        .sub {
            margin: 10px 0 18px;
            color: var(--muted);
            font-size: 0.93rem;
            line-height: 1.5;
        }

        .track {
            height: 8px;
            width: 100%;
            border-radius: 999px;
            background: rgba(107, 100, 128, 0.15);
            overflow: hidden;
        }

        .bar {
            height: 100%;
            width: 0%;
            border-radius: inherit;
            background: linear-gradient(90deg, #c578e8, #e3b0f4);
            animation: fill 2s ease-out forwards;
        }

        .tiny {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.8rem;
        }

        @keyframes fill {
            from { width: 0%; }
            to { width: 100%; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(215, 144, 238, 0.7); }
            70% { box-shadow: 0 0 0 14px rgba(215, 144, 238, 0); }
            100% { box-shadow: 0 0 0 0 rgba(215, 144, 238, 0); }
        }
    </style>
</head>
<body>
    <div class="loader-shell" role="status" aria-live="polite">
        <div class="brand">
            <span class="brand-dot" aria-hidden="true"></span>
            <span>PureLux Admin</span>
        </div>
        <p class="headline">Preparing your dashboard</p>
        <p class="sub">Loading secure workspace and redirecting to the admin control panel.</p>
        <div class="track" aria-hidden="true"><div class="bar"></div></div>
        <p class="tiny">If nothing happens, <a href="../src/admin/index.html">continue to admin</a>.</p>
    </div>

    <script>
        window.setTimeout(() => {
            window.location.replace("../src/admin/index.html");
        }, 1900);
    </script>
</body>
</html>
