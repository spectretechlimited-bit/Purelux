<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/png" href="../assets/img/logo.png"/>
    <title>Opening Admin | PureLux</title>
    <meta http-equiv="refresh" content="2; url=../src/admin/index.html"/>
    <style>
        :root {
            --bg: #14111a;
            --surface: rgba(255, 255, 255, 0.08);
            --surface-strong: rgba(255, 255, 255, 0.14);
            --ink: #f7f4fb;
            --muted: #c9c2d7;
            --accent: #d790ee;
            --accent-2: #7c83ff;
            --accent-soft: rgba(215, 144, 238, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Manrope, Segoe UI, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 20% 15%, rgba(215, 144, 238, 0.16), transparent 30%),
                radial-gradient(circle at 80% 85%, rgba(124, 131, 255, 0.16), transparent 34%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05), transparent 45%),
                var(--bg);
            overflow: hidden;
        }

        .loader-shell {
            width: min(88vw, 240px);
            display: grid;
            place-items: center;
        }

        .spinner-wrap {
            width: 112px;
            height: 112px;
            display: grid;
            place-items: center;
            position: relative;
        }

        .spinner-ring {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            border: 2px solid rgba(255, 255, 255, 0.08);
        }

        .spinner-ring:nth-child(2) {
            inset: 10px;
            border-color: rgba(215, 144, 238, 0.24);
        }

        .spinner-ring:nth-child(3) {
            inset: 22px;
            border-color: rgba(124, 131, 255, 0.22);
        }

        .spinner-core {
            width: 38px;
            height: 38px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            display: grid;
            place-items: center;
            position: absolute;
            box-shadow: 0 0 0 12px rgba(215, 144, 238, 0.1);
        }

        .spinner-core img {
            width: 24px;
            height: 24px;
            display: block;
            filter: brightness(0) invert(1);
            opacity: 0.95;
        }

        .spinner-arc {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-right-color: rgba(124, 131, 255, 0.95);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader-shell" role="status" aria-live="polite">
        <div class="spinner-wrap" aria-hidden="true">
            <span class="spinner-ring"></span>
            <span class="spinner-ring"></span>
            <span class="spinner-ring"></span>
            <span class="spinner-arc"></span>
            <span class="spinner-core">
                <img src="../assets/img/logo.png" alt="" aria-hidden="true"/>
            </span>
        </div>
    </div>

    <script>
        window.setTimeout(() => {
            window.location.replace("../src/admin/index.html");
        }, 1900);
    </script>
</body>
</html>
