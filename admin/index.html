<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="robots" content="noindex, nofollow, noarchive"/>
    <link rel="icon" type="image/png" href="../assets/img/logo.png"/>
    <title>Opening Admin | PureLux</title>
    <meta http-equiv="refresh" content="2; url=../src/admin/index.html"/>
    <style>
        :root {
            --bg: #f6f2fa;
            --bg-2: #ffffff;
            --surface: rgba(255, 255, 255, 0.82);
            --ink: #1f2430;
            --muted: #67718a;
            --accent: #d790ee;
            --accent-2: #7c83ff;
            --dot: rgba(31, 36, 48, 0.15);
            --dot-active: rgba(215, 144, 238, 0.95);
        }

        html.dark {
            --bg: #14111a;
            --bg-2: #1d1220;
            --surface: rgba(255, 255, 255, 0.08);
            --ink: #f7f4fb;
            --muted: #c9c2d7;
            --dot: rgba(255, 255, 255, 0.12);
            --dot-active: rgba(215, 144, 238, 0.95);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Manrope, Segoe UI, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 20% 15%, rgba(215, 144, 238, 0.16), transparent 30%),
                radial-gradient(circle at 80% 85%, rgba(124, 131, 255, 0.14), transparent 34%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05), transparent 45%),
                var(--bg);
            overflow: hidden;
        }

        .loader-shell {
            width: min(90vw, 220px);
            display: grid;
            place-items: center;
            gap: 12px;
            text-align: center;
        }

        .logo-wrap {
            width: 62px;
            height: 62px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 8px rgba(215, 144, 238, 0.12);
            display: grid;
            place-items: center;
            backdrop-filter: blur(10px);
        }

        .logo-wrap img {
            width: 34px;
            height: 34px;
            display: block;
            filter: brightness(0) invert(1);
            opacity: 0.95;
        }

        .dot-wave {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 14px;
        }

        .dot-wave span {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--dot);
            animation: wave 0.9s ease-in-out infinite;
        }

        .dot-wave span:nth-child(2),
        .dot-wave span:nth-child(4) {
            background: var(--dot-active);
        }

        .dot-wave span:nth-child(1) { animation-delay: 0s; }
        .dot-wave span:nth-child(2) { animation-delay: 0.12s; }
        .dot-wave span:nth-child(3) { animation-delay: 0.24s; }
        .dot-wave span:nth-child(4) { animation-delay: 0.36s; }

        .redirecting {
            margin: 0;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        @media (min-width: 768px) {
            .loader-shell {
                width: 180px;
                gap: 10px;
            }

            .logo-wrap {
                width: 54px;
                height: 54px;
            }

            .logo-wrap img {
                width: 30px;
                height: 30px;
            }
        }

        @keyframes wave {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="loader-shell" role="status" aria-live="polite">
        <div class="logo-wrap" aria-hidden="true">
            <img src="../assets/img/logo.png" alt="" aria-hidden="true"/>
        </div>
        <div class="dot-wave" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <p class="redirecting">Redirecting</p>
    </div>

    <script>
        window.setTimeout(() => {
            window.location.replace("../src/admin/index.html");
        }, 1900);
    </script>
</body>
</html>
