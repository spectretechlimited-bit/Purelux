<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Services Management | PureLux Admin</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="../../../assets/css/main.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="../../../assets/js/theme.js"></script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="flex flex-col lg:flex-row min-h-screen">
        <!-- Sidebar (Simplified Sidebar as per dashboard structure) -->
        <aside class="w-full lg:w-72 bg-white dark:bg-surface border-r border-primary/20 p-6 flex flex-col gap-10">
            <div class="flex items-center gap-4">
                <img src="../../../assets/img/logo.png" alt="PureLux Logo" class="h-10 w-auto">
                <h2 class="text-xl font-black text-slate-100">Admin Panel</h2>
            </div>
            <nav class="flex flex-col gap-3">
                <a href="../dashboard.html" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-primary/10 transition-all font-semibold">
                    <span class="material-symbols-outlined">dashboard</span> Dashboard
                </a>
                <a href="../bookings/index.html" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-primary/10 transition-all font-semibold">
                    <span class="material-symbols-outlined">calendar_month</span> Bookings
                </a>
                <a href="index.html" class="flex items-center gap-4 px-6 py-4 rounded-2xl bg-primary text-background-dark font-bold shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined">auto_awesome</span> Services
                </a>
                <a href="../gallery/index.html" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-primary/10 transition-all font-semibold">
                    <span class="material-symbols-outlined">photo_library</span> Gallery
                </a>
                <a href="../analytics/index.html" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-primary/10 transition-all font-semibold">
                    <span class="material-symbols-outlined">trending_up</span> Analytics
                </a>
                <div class="border-t border-primary/10 my-4"></div>
                <a href="../../../index.html" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-primary/10 transition-all font-semibold mt-auto">
                    <span class="material-symbols-outlined">visibility</span> View Website
                </a>
                <a href="../auth/login.html" class="flex items-center gap-4 px-6 py-4 rounded-2xl text-rose-500 hover:bg-rose-500/10 transition-all font-semibold">
                    <span class="material-symbols-outlined">logout</span> Sign Out
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-8 lg:p-12 space-y-12">
            <header>
                <h1 class="text-4xl font-black tracking-tight text-primary">Manage Services</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-2 text-lg">Add or update service offerings for your clients.</p>
            </header>

            <form class="bg-white dark:bg-surface p-10 rounded-3xl border border-primary/10 shadow-sm space-y-8 max-w-2xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label class="font-bold text-sm uppercase tracking-widest text-slate-500">Service Name</label>
                        <input type="text" class="w-full bg-primary/5 border border-primary/10 rounded-2xl p-4 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Enter service name...">
                    </div>
                    <div class="space-y-3">
                        <label class="font-bold text-sm uppercase tracking-widest text-slate-500">Category</label>
                        <select class="w-full bg-primary/5 border border-primary/10 rounded-2xl p-4 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all">
                            <option>Skincare</option>
                            <option>Massage</option>
                            <option>Wraps</option>
                            <option>Nails</option>
                            <option>Facials</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 space-y-3">
                        <label class="font-bold text-sm uppercase tracking-widest text-slate-500">Description</label>
                        <textarea rows="4" class="w-full bg-primary/5 border border-primary/10 rounded-2xl p-4 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="What does this service offer?"></textarea>
                    </div>
                    <div class="space-y-3">
                        <label class="font-bold text-sm uppercase tracking-widest text-slate-500">Price ($)</label>
                        <input type="number" class="w-full bg-primary/5 border border-primary/10 rounded-2xl p-4 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="e.g. 50">
                    </div>
                    <div class="space-y-3">
                        <label class="font-bold text-sm uppercase tracking-widest text-slate-500">Duration (Min)</label>
                        <input type="number" class="w-full bg-primary/5 border border-primary/10 rounded-2xl p-4 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="e.g. 60">
                    </div>
                </div>
                
                <div class="pt-6">
                    <button type="submit" class="w-full bg-primary hover:bg-primary-light text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-lg shadow-primary/30 text-lg">
                        Submit Service Changes
                    </button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
