<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PureLux Admin Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="../../assets/css/main.css" rel="stylesheet"/>
    <script src="../../assets/js/theme.js"></script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white dark:bg-surface p-8 rounded-3xl border border-primary/20 shadow-2xl">
        <div class="text-center mb-8">
            <img src="../../assets/img/logo.png" alt="PureLux Logo" class="h-12 w-auto mx-auto mb-4">
            <h1 class="text-2xl font-bold">Admin Portal</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Sign in to manage PureLux</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full rounded-xl border-primary/20 bg-background-light dark:bg-background-dark/50 focus:ring-primary focus:border-primary px-4 py-3" placeholder="admin@purelux.com">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input type="password" id="password" required class="w-full rounded-xl border-primary/20 bg-background-light dark:bg-background-dark/50 focus:ring-primary focus:border-primary px-4 py-3" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-primary text-background-dark font-bold py-4 rounded-xl hover:shadow-[0_0_20px_rgba(215,144,238,0.4)] transition-all">
                Sign In
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Bypass for testing - accepts any email & password
            localStorage.setItem('adminToken', 'purelux-test-token');
            window.location.href = '../dashboard.html';
        });
    </script>
</body>
</html>
